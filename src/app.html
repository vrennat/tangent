<!doctype html>
<html lang="en" data-theme="nightstand">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#15110c" />
		<!--
			No-flash theme: resolve the saved preference (or the OS color-scheme for 'system')
			and set data-theme + the chrome tint BEFORE first paint, so a light-theme reload
			never flashes the dark default. The store (theme.svelte.ts) takes over after hydration.
			The bg map mirrors THEMES[].bg — keep in sync when adding a curated theme.
		-->
		<script>
			(function () {
				try {
					var pref = localStorage.getItem('tangent:theme:v1') || 'system';
					if (pref === 'system') {
						pref = matchMedia('(prefers-color-scheme: dark)').matches ? 'nightstand' : 'daylight';
					}
					document.documentElement.dataset.theme = pref;
					// Chrome tint per theme (mirrors THEMES[].bg). An unknown pref harmlessly
					// renders the @theme default, and the store re-syncs both at hydration.
					var bg = {
						nightstand: '#15110c',
						daylight: '#f5efe3',
						sepia: '#f3e8d2',
						slate: '#15171c',
						forest: '#0f1410',
						'high-contrast': '#000000'
					};
					var m = bg[pref] && document.querySelector('meta[name="theme-color"]');
					if (m) m.setAttribute('content', bg[pref]);
				} catch (e) {}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap"
			rel="stylesheet"
		/>
		<meta
			name="description"
			content="Tangent — fall down a Wikipedia rabbit hole. A feed of connected articles that shows how unrelated topics link together."
		/>
		<!-- Social share card. og:image must be an absolute URL — scrapers don't resolve
		     relative paths or %sveltekit.assets%. Image generated from scripts/og-card.html. -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Tangent" />
		<meta property="og:url" content="https://tangent.page" />
		<meta property="og:title" content="Tangent — fall down a Wikipedia rabbit hole" />
		<meta
			property="og:description"
			content="A feed of connected Wikipedia articles that shows how unrelated topics link together."
		/>
		<meta property="og:image" content="https://tangent.page/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Tangent — fall down a Wikipedia rabbit hole" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Tangent — fall down a Wikipedia rabbit hole" />
		<meta
			name="twitter:description"
			content="A feed of connected Wikipedia articles that shows how unrelated topics link together."
		/>
		<meta name="twitter:image" content="https://tangent.page/og.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-void text-ink antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
