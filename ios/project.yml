name: Tangent
options:
  bundleIdPrefix: page.tangent
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Set DEVELOPMENT_TEAM here (or via xcconfig) for on-device builds + passkeys later.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

schemes:
  Tangent:
    build:
      targets:
        Tangent: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TangentTests

targets:
  TangentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TangentTests
    dependencies:
      - target: Tangent
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: page.tangent.tests

  Tangent:
    type: application
    platform: iOS
    sources:
      - path: Tangent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: page.tangent.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Tangent/Info.plist
      properties:
        CFBundleDisplayName: Tangent
        UILaunchScreen:
          UIColorName: VoidBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIUserInterfaceStyle: Dark
        # Allow the http://localhost dev server without disabling ATS globally.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
