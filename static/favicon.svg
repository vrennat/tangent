<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
	<!-- Tangent mark: an S-curve (the path you were on) in ink, with a tangent
	     line and touch-point dot in the ember accent — the moment you go off on
	     one. Mirrors BrandMark.svelte, scaled inside a padded void plate so the
	     line's round caps don't clip the rounded corners. -->
	<rect width="32" height="32" rx="7" fill="#15110c" />
	<g transform="translate(4 4) scale(0.75)">
		<path
			d="M 2 28 C 2 4, 14 4, 18 16 C 22 28, 26 28, 30 8"
			fill="none"
			stroke="#ece4d6"
			stroke-width="3.2"
			stroke-linecap="round"
			stroke-linejoin="round"
		/>
		<line x1="0" y1="2" x2="32" y2="19" stroke="#e0a14e" stroke-width="2.6" stroke-linecap="round" />
		<circle cx="13" cy="9" r="2.6" fill="#e0a14e" />
	</g>
</svg>
